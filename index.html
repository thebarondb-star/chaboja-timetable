<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CHABOJA ERP 타임테이블</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic','Apple SD Gothic Neo',sans-serif; background:#0f172a; color:#e2e8f0; min-height:100vh; }

/* ─── 헤더 ─── */
.header { background:linear-gradient(135deg,#1e3a8a,#2563eb); padding:20px 36px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.header h1 { font-size:1.3em; font-weight:800; }
.header-sub { display:flex; gap:10px; align-items:center; margin-top:6px; flex-wrap:wrap; font-size:0.82em; opacity:0.85; }
.hdr-input { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); color:white; padding:3px 8px; border-radius:6px; font-size:0.85em; font-family:inherit; }
.hdr-input:focus { outline:none; background:rgba(255,255,255,0.25); }
.badge { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.25); padding:4px 12px; border-radius:20px; font-size:0.78em; }

/* ─── 상태바 ─── */
.statusbar { background:#1e293b; padding:10px 36px; display:flex; gap:20px; align-items:center; flex-wrap:wrap; border-bottom:1px solid #334155; font-size:0.75em; color:#94a3b8; }
.legend { display:flex; align-items:center; gap:5px; }
.ldot { width:9px; height:9px; border-radius:2px; }
.tip { margin-left:auto; font-size:0.72em; color:#475569; }

/* ─── 컨테이너 ─── */
.container { padding:20px 36px 60px; max-width:1440px; margin:0 auto; }

/* ─── 요약 ─── */
.summary { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:20px; }
.sum-card { background:#1e293b; border-radius:10px; padding:12px 16px; border:1px solid #334155; }
.sum-card .n { font-size:1.6em; font-weight:800; margin-bottom:2px; }
.sum-card .l { font-size:0.72em; color:#64748b; }
.c-blue .n { color:#60a5fa; } .c-green .n { color:#4ade80; } .c-yellow .n { color:#fbbf24; } .c-purple .n { color:#c084fc; }

/* ─── 페이즈 ─── */
.phase-block { margin-bottom:20px; border-radius:12px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.3); }
.phase-header { padding:12px 18px; display:flex; align-items:center; gap:10px; cursor:pointer; user-select:none; }
.phase-header:hover { filter:brightness(1.08); }
.ph-title { font-weight:700; font-size:0.95em; flex:1; }
.ph-meta { display:flex; align-items:center; gap:5px; }
.ph-date { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); color:white; padding:2px 5px; border-radius:4px; font-size:0.78em; font-family:inherit; width:112px; }
.ph-date:focus { outline:none; background:rgba(255,255,255,0.25); }
.ph-dur { font-size:0.75em; opacity:0.65; }
.ph-toggle { font-size:0.8em; opacity:0.7; transition:transform 0.2s; }
.ph-toggle.open { transform:rotate(90deg); }

/* ─── 테이블 ─── */
.gantt-wrap { background:#1e293b; overflow-x:auto; }
.gtable { width:100%; border-collapse:collapse; min-width:960px; }
.gtable th { background:#0f172a; color:#64748b; font-size:0.68em; font-weight:600; padding:7px 5px; border-bottom:1px solid #334155; white-space:nowrap; text-align:left; }
.gtable th.wth { text-align:center; width:34px; min-width:34px; }
.gtable td { padding:0; border-bottom:1px solid #182030; vertical-align:top; }
.gtable tr:last-child td { border-bottom:none; }
.gtable tr:hover .tcell { background:#243044; }

/* ─── 작업 셀 ─── */
.tcell { padding:8px 10px; background:#1e293b; min-width:340px; max-width:340px; width:340px; display:flex; flex-direction:column; gap:4px; }
.tmain { display:flex; align-items:center; gap:6px; }
.tnum { color:#475569; font-size:0.68em; min-width:22px; flex-shrink:0; }
.ttitle { font-size:0.83em; flex:1; outline:none; border-bottom:1px dashed transparent; line-height:1.4; cursor:text; }
.ttitle:focus { border-bottom-color:#3b82f6; }
.ttitle:empty:before { content:'작업명 입력...'; color:#475569; }

/* ─── 배지 버튼 ─── */
.abtn,.sbtn { font-size:0.68em; padding:2px 7px; border-radius:10px; border:none; outline:none; font-family:inherit; cursor:pointer; white-space:nowrap; flex-shrink:0; }
.a-me   { background:#1d4ed8; color:#bfdbfe; }
.a-dev  { background:#7c3aed; color:#ede9fe; }
.a-both { background:#065f46; color:#a7f3d0; }
.s-todo   { background:#1e293b; color:#64748b; border:1px solid #334155 !important; }
.s-doing  { background:#92400e; color:#fcd34d; }
.s-done   { background:#14532d; color:#86efac; }
.s-hold   { background:#3b1f6b; color:#c4b5fd; }
.s-review { background:#1e3a8a; color:#93c5fd; }

/* ─── 날짜 행 ─── */
.tdates { display:flex; align-items:center; gap:4px; padding-left:28px; }
.tdlabel { font-size:0.62em; color:#475569; }
.tdinput { background:#0f172a; border:1px solid #334155; color:#94a3b8; padding:1px 4px; border-radius:4px; font-size:0.65em; font-family:inherit; width:104px; cursor:pointer; }
.tdinput:focus { outline:none; border-color:#3b82f6; color:#e2e8f0; }
.tdsep { color:#475569; font-size:0.65em; }
.tddur { font-size:0.62em; color:#475569; }

/* ─── 우선순위 점 ─── */
.pdot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.p-high { background:#ef4444; } .p-mid { background:#f59e0b; } .p-low { background:#22c55e; }

/* ─── 주간 바 ─── */
.wcell { width:34px; min-width:34px; padding:4px 3px; text-align:center; background:#1e293b; vertical-align:middle; }
.wbar { height:26px; border-radius:4px; cursor:pointer; transition:opacity 0.15s; }
.wbar:hover { opacity:0.8; }
.w-empty  { background:transparent; border:1px dashed #334155; }
.w-me     { background:linear-gradient(90deg,#3b82f6,#2563eb); }
.w-dev    { background:linear-gradient(90deg,#8b5cf6,#7c3aed); }
.w-both   { background:linear-gradient(90deg,#10b981,#059669); }

/* ─── 메모 ─── */
.tnote-row td { padding:0 !important; }
.tnote { font-size:0.68em; color:#64748b; padding:2px 10px 5px 40px; background:#1e293b; outline:none; border-bottom:1px dashed transparent; display:block; width:100%; }
.tnote:focus { border-bottom-color:#3b82f6; color:#94a3b8; }
.tnote:empty:before { content:'메모...'; color:#2a3a4e; }

/* ─── 추가 버튼 ─── */
.add-btn { background:none; border:1px dashed #334155; color:#475569; padding:7px; width:100%; cursor:pointer; font-size:0.75em; transition:all 0.2s; font-family:inherit; }
.add-btn:hover { background:#243044; color:#94a3b8; }

/* ─── 삭제 버튼 ─── */
.del-btn { background:none; border:none; color:#475569; cursor:pointer; padding:2px 6px; border-radius:4px; font-size:0.82em; opacity:0.45; transition:opacity 0.15s,color 0.15s; flex-shrink:0; }
.del-btn:hover { opacity:1; color:#ef4444; }

/* ─── 로딩 ─── */
.loading { text-align:center; padding:60px; color:#64748b; font-size:0.9em; }

/* ─── 저장 표시 ─── */
.save-indicator { position:fixed; bottom:20px; right:20px; background:#14532d; color:#86efac; padding:8px 16px; border-radius:8px; font-size:0.8em; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:9999; }
.save-indicator.show { opacity:1; }
</style>
</head>
<body>

<div id="app"><div class="loading">⏳ 데이터 불러오는 중...</div></div>
<div class="save-indicator" id="save-indicator">✓ 저장됨</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// =============================================
// ⚙️ Supabase 설정 (여기에 본인 값 입력)
// =============================================
const SUPABASE_URL  = 'YOUR_SUPABASE_URL'   // 예: https://abcdefgh.supabase.co
const SUPABASE_KEY  = 'YOUR_SUPABASE_ANON_KEY'  // Supabase > Settings > API > anon public
// =============================================

const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_KEY)

let state = { settings: {}, phases: [], tasks: {} }
let saveTimers = {}

const ASSIGNEES = ['나','개발자','공동']
const STATUSES  = ['예정','진행중','완료','보류','검토중']
const WBAR_STATES = ['w-empty','w-me','w-dev','w-both']
const WEEKS = ['W1|4/14','W2|4/21','W3|4/28','W4|5/5','W5|5/12','W6|5/19','W7|5/26','W8|6/2','W9|6/9','W10|6/16','W11|6/23','W12|6/30']

// ─── 초기화 ───
async function init() {
  try {
    const [{ data: s }, { data: ph }, { data: tk }] = await Promise.all([
      db.from('tt_settings').select('*').single(),
      db.from('tt_phases').select('*').order('sort_order'),
      db.from('tt_tasks').select('*').order('sort_order')
    ])
    state.settings = s || { name:'CHABOJA ERP 타임테이블', start_date:'', end_date:'' }
    state.phases = ph || []
    state.tasks = {}
    ;(tk || []).forEach(t => {
      if (!state.tasks[t.phase_id]) state.tasks[t.phase_id] = []
      state.tasks[t.phase_id].push(t)
    })
    render()
    subscribe()
  } catch(e) {
    document.getElementById('app').innerHTML = '<div class="loading">❌ 연결 실패. Supabase URL/KEY를 확인해주세요.<br><small>' + e.message + '</small></div>'
  }
}

// ─── 렌더 ───
function render() {
  const s = state.settings
  const dur = calcDur(s.start_date, s.end_date)
  document.getElementById('app').innerHTML = `
    <div class="header">
      <div>
        <h1>🚗 <span id="proj-name" contenteditable="true" style="outline:none;border-bottom:2px dashed rgba(255,255,255,0.3);padding-bottom:1px">${esc(s.name)}</span></h1>
        <div class="header-sub">
          <span style="opacity:.6">전체 시작</span>
          <input type="date" class="hdr-input" id="proj-start" value="${s.start_date||''}" onchange="saveSetting('start_date',this.value);updateDur()">
          <span style="opacity:.6">완료예정</span>
          <input type="date" class="hdr-input" id="proj-end" value="${s.end_date||''}" onchange="saveSetting('end_date',this.value);updateDur()">
          <span id="proj-dur" style="opacity:.6">${dur}</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span class="badge">🔵 나 &nbsp;🟣 개발자 &nbsp;🟢 공동</span>
        <button onclick="window.print()" style="background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.3);color:white;padding:5px 12px;border-radius:7px;cursor:pointer;font-family:inherit;font-size:0.8em">🖨 인쇄</button>
      </div>
    </div>
    <div class="statusbar">
      <span>상태:</span>
      ${[['#334155','예정'],['#92400e','진행중'],['#14532d','완료'],['#3b1f6b','보류'],['#1e3a8a','검토중']].map(([c,t])=>`<div class="legend"><span class="ldot" style="background:${c}"></span>${t}</div>`).join('')}
      <span style="margin-left:6px">우선순위:</span>
      ${[['#ef4444','높음'],['#f59e0b','중간'],['#22c55e','낮음']].map(([c,t])=>`<div class="legend"><span class="ldot" style="background:${c};border-radius:50%"></span>${t}</div>`).join('')}
      <span class="tip">※ 작업명·메모 클릭=수정 | 담당자·상태=클릭 순환 | 날짜=달력 | 주간바=클릭 토글</span>
    </div>
    <div class="container">
      ${renderSummary()}
      ${state.phases.map(p => renderPhase(p)).join('')}
    </div>
  `
  // 이름 편집 이벤트
  const nameEl = document.getElementById('proj-name')
  if (nameEl) {
    let nameTimer
    nameEl.addEventListener('input', () => {
      clearTimeout(nameTimer)
      nameTimer = setTimeout(() => saveSetting('name', nameEl.textContent.trim()), 700)
    })
  }
}

function renderSummary() {
  let total=0,done=0,doing=0,todo=0
  Object.values(state.tasks).flat().forEach(t => {
    total++
    if (t.status==='완료') done++
    else if (t.status==='진행중') doing++
    else todo++
  })
  return `<div class="summary">
    <div class="sum-card c-blue"><div class="n">${total}</div><div class="l">전체 작업</div></div>
    <div class="sum-card c-green"><div class="n">${done}</div><div class="l">완료</div></div>
    <div class="sum-card c-yellow"><div class="n">${doing}</div><div class="l">진행중</div></div>
    <div class="sum-card c-purple"><div class="n">${todo}</div><div class="l">예정</div></div>
  </div>`
}

function renderPhase(phase) {
  const tasks = state.tasks[phase.id] || []
  const dur = calcDur(phase.start_date, phase.end_date)
  const wkHeader = '<th style="min-width:340px;width:340px">작업</th>' +
    WEEKS.map(w => { const[n,d]=w.split('|'); return `<th class="wth"><span style="font-size:.65em;color:#475569;display:block">${n}</span><span style="font-size:.58em;color:#334155;display:block">${d}</span></th>` }).join('')

  return `
  <div class="phase-block" id="ph-${phase.id}">
    <div class="phase-header" style="background:${phase.gradient}" onclick="togglePhase('${phase.id}')">
      <span class="ph-title">Phase ${phase.sort_order} — ${esc(phase.title)}</span>
      <div class="ph-meta" onclick="event.stopPropagation()">
        <input type="date" class="ph-date" value="${phase.start_date||''}" onchange="savePhase('${phase.id}',{start_date:this.value});updatePhaseDur(this)">
        <span style="opacity:.6">–</span>
        <input type="date" class="ph-date" value="${phase.end_date||''}" onchange="savePhase('${phase.id}',{end_date:this.value});updatePhaseDur(this)">
        <span class="ph-dur" id="phdur-${phase.id}">${dur ? '('+dur+')' : ''}</span>
        <button class="del-btn" onclick="event.stopPropagation();deletePhase('${phase.id}')" title="페이즈 삭제">🗑</button>
      </div>
      <span class="ph-toggle open" id="phtog-${phase.id}">▶</span>
    </div>
    <div class="gantt-wrap" id="phbody-${phase.id}">
      <table class="gtable">
        <thead><tr>${wkHeader}</tr></thead>
        <tbody id="tbd-${phase.id}">
          ${tasks.map(t => renderTask(t)).join('')}
        </tbody>
        <tfoot><tr><td colspan="13"><button class="add-btn" onclick="addTask('${phase.id}')">+ 작업 추가</button></td></tr></tfoot>
      </table>
    </div>
  </div>`
}

function renderTask(t) {
  const bars = (t.week_bars || Array(12).fill('')).map((b,i) =>
    `<td><div class="wcell"><div class="wbar ${b||'w-empty'}" onclick="toggleWeekBar('${t.id}',${i},'${b||''}')"></div></div></td>`
  ).join('')
  const dur = calcDur(t.start_date, t.end_date)
  const aClass = t.assignee==='개발자' ? 'a-dev' : t.assignee==='공동' ? 'a-both' : 'a-me'
  const sClass = {'예정':'s-todo','진행중':'s-doing','완료':'s-done','보류':'s-hold','검토중':'s-review'}[t.status] || 's-todo'
  const pClass = t.priority==='high' ? 'p-high' : t.priority==='low' ? 'p-low' : 'p-mid'

  return `
  <tr id="trow-${t.id}">
    <td><div class="tcell">
      <div class="tmain">
        <span class="pdot ${pClass}" onclick="cyclePriority('${t.id}','${t.priority||'mid'}')" style="cursor:pointer" title="우선순위 변경"></span>
        <span class="tnum">${esc(t.task_num||'')}</span>
        <span class="ttitle" contenteditable="true" data-id="${t.id}" onblur="debounceSave('${t.id}',{title:this.textContent.trim()})">${esc(t.title)}</span>
        <button class="abtn ${aClass}" onclick="cycleAssignee('${t.id}','${t.assignee||'나'}')">${t.assignee||'나'}</button>
        <button class="sbtn ${sClass}" onclick="cycleStatus('${t.id}','${t.status||'예정'}')">${t.status||'예정'}</button>
        <button class="del-btn" onclick="deleteTask('${t.id}','${t.phase_id}')" title="작업 삭제">✕</button>
      </div>
      <div class="tdates">
        <span class="tdlabel">시작</span>
        <input type="date" class="tdinput" value="${t.start_date||''}" onchange="saveTask('${t.id}',{start_date:this.value});updateTaskDur(this)">
        <span class="tdsep">→</span>
        <span class="tdlabel">완료</span>
        <input type="date" class="tdinput" value="${t.end_date||''}" onchange="saveTask('${t.id}',{end_date:this.value});updateTaskDur(this)">
        <span class="tddur" id="tdur-${t.id}">${dur||''}</span>
      </div>
    </div></td>
    ${bars}
  </tr>
  <tr class="tnote-row" id="tnote-row-${t.id}">
    <td colspan="13">
      <div class="tnote" contenteditable="true" onblur="debounceSave('${t.id}',{note:this.textContent.trim()})">${esc(t.note||'')}</div>
    </td>
  </tr>`
}

// ─── 유틸 ───
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function calcDur(s, e) {
  if (!s || !e) return ''
  const d = Math.round((new Date(e) - new Date(s)) / 86400000)
  return d < 0 ? '⚠️' : d === 0 ? '당일' : Math.round(d/7)+'주'
}
function showSaved() {
  const el = document.getElementById('save-indicator')
  el.classList.add('show')
  setTimeout(() => el.classList.remove('show'), 1500)
}
function findTask(id) {
  return Object.values(state.tasks).flat().find(t => t.id === id)
}

// ─── DB 저장 ───
async function saveTask(id, updates) {
  Object.assign(findTask(id) || {}, updates)
  await db.from('tt_tasks').update(updates).eq('id', id)
  showSaved()
}
function debounceSave(id, updates) {
  clearTimeout(saveTimers[id])
  saveTimers[id] = setTimeout(() => saveTask(id, updates), 600)
}
async function savePhase(id, updates) {
  const ph = state.phases.find(p => p.id === id)
  if (ph) Object.assign(ph, updates)
  await db.from('tt_phases').update(updates).eq('id', id)
  showSaved()
}
async function saveSetting(key, value) {
  state.settings[key] = value
  await db.from('tt_settings').update({ [key]: value }).eq('id', 1)
  showSaved()
}

// ─── 순환 클릭 ───
async function cycleAssignee(id, current) {
  const next = ASSIGNEES[(ASSIGNEES.indexOf(current)+1) % ASSIGNEES.length]
  await saveTask(id, { assignee: next })
  const btn = document.querySelector(`#trow-${id} .abtn`)
  if (btn) { btn.textContent = next; btn.className = 'abtn ' + (next==='개발자'?'a-dev':next==='공동'?'a-both':'a-me') }
}
async function cycleStatus(id, current) {
  const next = STATUSES[(STATUSES.indexOf(current)+1) % STATUSES.length]
  await saveTask(id, { status: next })
  const map = {'예정':'s-todo','진행중':'s-doing','완료':'s-done','보류':'s-hold','검토중':'s-review'}
  const btn = document.querySelector(`#trow-${id} .sbtn`)
  if (btn) { btn.textContent = next; btn.className = 'sbtn ' + map[next] }
  // 요약 업데이트
  document.querySelector('.summary').outerHTML = renderSummary()
}
async function cyclePriority(id, current) {
  const prios = ['high','mid','low']
  const next = prios[(prios.indexOf(current)+1) % prios.length]
  await saveTask(id, { priority: next })
  const dot = document.querySelector(`#trow-${id} .pdot`)
  if (dot) { dot.className = 'pdot p-' + next }
}
async function toggleWeekBar(id, idx, current) {
  const task = findTask(id)
  if (!task) return
  const bars = [...(task.week_bars || Array(12).fill(''))]
  const next = WBAR_STATES[(WBAR_STATES.indexOf(current)+1) % WBAR_STATES.length]
  bars[idx] = next
  task.week_bars = bars
  await db.from('tt_tasks').update({ week_bars: bars }).eq('id', id)
  const bar = document.querySelector(`#trow-${id} td:nth-child(${idx+2}) .wbar`)
  if (bar) bar.className = 'wbar ' + (next||'w-empty')
  showSaved()
}

// ─── 날짜 표시 갱신 ───
function updateDur() {
  const s = document.getElementById('proj-start')?.value
  const e = document.getElementById('proj-end')?.value
  const el = document.getElementById('proj-dur')
  if (el) el.textContent = calcDur(s, e)
}
function updatePhaseDur(input) {
  const meta = input.closest('.ph-meta')
  const [s,e] = meta.querySelectorAll('.ph-date')
  const phaseId = input.closest('.phase-block').id.replace('ph-','')
  const el = document.getElementById('phdur-'+phaseId)
  const dur = calcDur(s?.value, e?.value)
  if (el) el.textContent = dur ? '('+dur+')' : ''
}
function updateTaskDur(input) {
  const row = input.closest('tr')
  const taskId = row.id.replace('trow-','')
  const inputs = row.querySelectorAll('.tdinput')
  const el = document.getElementById('tdur-'+taskId)
  const dur = calcDur(inputs[0]?.value, inputs[1]?.value)
  if (el) el.textContent = dur || ''
}

// ─── 페이즈 접기 ───
function togglePhase(id) {
  const body = document.getElementById('phbody-'+id)
  const tog = document.getElementById('phtog-'+id)
  if (!body) return
  const open = body.style.display !== 'none'
  body.style.display = open ? 'none' : ''
  tog?.classList.toggle('open', !open)
}

// ─── 페이즈 삭제 ───
async function deletePhase(id) {
  const ph = state.phases.find(p => p.id === id)
  const taskCount = (state.tasks[id] || []).length
  const msg = taskCount > 0
    ? `"${ph?.title}" 페이즈와 포함된 ${taskCount}개 작업을 모두 삭제할까요?`
    : `"${ph?.title}" 페이즈를 삭제할까요?`
  if (!confirm(msg)) return
  await db.from('tt_tasks').delete().eq('phase_id', id)
  await db.from('tt_phases').delete().eq('id', id)
  state.phases = state.phases.filter(p => p.id !== id)
  delete state.tasks[id]
  document.getElementById('ph-'+id)?.remove()
  showSaved()
}

// ─── 작업 삭제 ───
async function deleteTask(id, phaseId) {
  if (!confirm('이 작업을 삭제할까요?')) return
  await db.from('tt_tasks').delete().eq('id', id)
  if (state.tasks[phaseId]) {
    state.tasks[phaseId] = state.tasks[phaseId].filter(t => t.id !== id)
  }
  document.getElementById('trow-'+id)?.remove()
  document.getElementById('tnote-row-'+id)?.remove()
  showSaved()
}

// ─── 작업 추가 ───
async function addTask(phaseId) {
  const tasks = state.tasks[phaseId] || []
  const phaseNum = state.phases.find(p=>p.id===phaseId)?.sort_order || ''
  const taskNum = phaseNum + '.' + (tasks.length + 1)
  const { data, error } = await db.from('tt_tasks')
    .insert({ phase_id: phaseId, task_num: taskNum, title: '새 작업', sort_order: tasks.length })
    .select().single()
  if (error || !data) return
  if (!state.tasks[phaseId]) state.tasks[phaseId] = []
  state.tasks[phaseId].push(data)
  const tbody = document.getElementById('tbd-'+phaseId)
  if (tbody) tbody.insertAdjacentHTML('beforeend', renderTask(data))
  showSaved()
}

// ─── 실시간 구독 ───
function subscribe() {
  db.channel('timetable-live')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'tt_tasks' }, ({ new: t }) => {
      const task = findTask(t.id)
      if (task) Object.assign(task, t)
      const row = document.getElementById('trow-'+t.id)
      if (row) {
        const aBtn = row.querySelector('.abtn')
        const sBtn = row.querySelector('.sbtn')
        const aMap = {'개발자':'a-dev','공동':'a-both','나':'a-me'}
        const sMap = {'예정':'s-todo','진행중':'s-doing','완료':'s-done','보류':'s-hold','검토중':'s-review'}
        if (aBtn) { aBtn.textContent = t.assignee; aBtn.className = 'abtn '+(aMap[t.assignee]||'a-me') }
        if (sBtn) { sBtn.textContent = t.status; sBtn.className = 'sbtn '+(sMap[t.status]||'s-todo') }
      }
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'tt_tasks' }, ({ new: t }) => {
      if (!state.tasks[t.phase_id]) state.tasks[t.phase_id] = []
      if (!state.tasks[t.phase_id].find(x=>x.id===t.id)) {
        state.tasks[t.phase_id].push(t)
        const tbody = document.getElementById('tbd-'+t.phase_id)
        if (tbody) tbody.insertAdjacentHTML('beforeend', renderTask(t))
      }
    })
    .subscribe()
}

init()
</script>

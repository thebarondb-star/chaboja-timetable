<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>타임테이블</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f1f5f9; --bg2:#ffffff; --bg3:#f8fafc; --bg4:#e2e8f0; --bg5:#dde4ef;
  --text:#1e293b; --text2:#475569; --text3:#64748b; --text4:#94a3b8;
  --border:#e2e8f0; --input-bg:#f8fafc; --note-ph:#cbd5e1;
  --row-upper:#e4eaf4; --row-lower:#ffffff;
}
body { font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

/* ─── 탭 바 ─── */
.tabs-bar {
  background:#dde6f0;
  white-space:nowrap;
  overflow-x:auto; scrollbar-width:none;
  border-bottom:2px solid #1e3a5f;
  padding:0 16px;
  height:42px; line-height:42px;
  font-size:0;
}
.tabs-bar::-webkit-scrollbar { display:none; }
.tab-item {
  display:inline-flex; align-items:center; gap:8px; vertical-align:top;
  height:42px; padding:0 18px; cursor:pointer; font-size:13px; color:#64748b;
  border-bottom:3px solid transparent; white-space:nowrap; user-select:none;
  transition:color .15s,border-color .15s,background .15s;
}
.tab-item:hover { color:#94a3b8; background:#0f1f35; }
.tab-item.active { color:#e2e8f0; border-bottom-color:#3b82f6; font-weight:600; background:#1e293b; }
.tab-del {
  display:inline-flex; align-items:center; justify-content:center;
  background:none; border:none; color:#475569; cursor:pointer;
  font-size:12px; width:16px; height:16px; border-radius:3px;
  opacity:0; transition:opacity .15s; padding:0; vertical-align:middle; flex-shrink:0;
}
.tab-item:hover .tab-del, .tab-item.active .tab-del { opacity:1; }
.tab-del:hover { background:rgba(239,68,68,0.25); color:#ef4444; }
.tab-add-btn {
  display:inline-flex; align-items:center; justify-content:center;
  background:none; border:none; color:#475569; cursor:pointer;
  font-size:18px; height:42px; padding:0 12px; vertical-align:top;
  transition:color .15s; line-height:1;
}
.tab-add-btn:hover { color:#93c5fd; }
.tabs-bar { border-bottom-color:#cbd5e1; }
.tab-item.active { background:#ffffff; color:#1e40af; border-bottom-color:#2563eb; }
.tab-item:hover { background:#d4dce8; color:#334155; }
.tab-add-btn:hover { color:#2563eb; }

/* ─── 마이그레이션 안내 모달 ─── */
.migration-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:99999;
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.migration-box {
  background:#1e293b; border:1px solid #334155; border-radius:14px;
  padding:28px 32px; max-width:560px; width:100%;
}
.migration-box h2 { font-size:1.1em; margin-bottom:10px; color:#e2e8f0; }
.migration-box p { font-size:0.82em; color:#94a3b8; margin-bottom:14px; line-height:1.6; }
.migration-sql {
  background:#0f172a; border:1px solid #334155; border-radius:8px;
  padding:12px 16px; font-family:monospace; font-size:0.78em; color:#86efac;
  white-space:pre; overflow-x:auto; margin-bottom:16px;
}
.migration-copy {
  background:#1d4ed8; border:none; color:white; padding:8px 18px; border-radius:7px;
  cursor:pointer; font-family:inherit; font-size:0.82em; margin-right:8px;
}
.migration-copy:hover { background:#2563eb; }
.migration-dismiss {
  background:none; border:1px solid #334155; color:#94a3b8; padding:8px 18px;
  border-radius:7px; cursor:pointer; font-family:inherit; font-size:0.82em;
}
.migration-dismiss:hover { border-color:#94a3b8; color:#e2e8f0; }

.header { background:linear-gradient(135deg,#1e3a8a,#2563eb); padding:20px 36px; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; }
.header h1 { font-size:1.3em; font-weight:800; }
.header-sub { display:flex; gap:10px; align-items:center; margin-top:6px; flex-wrap:wrap; font-size:0.82em; opacity:0.85; }
.hdr-input { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); color:white; padding:3px 8px; border-radius:6px; font-size:0.85em; font-family:inherit; }
.hdr-input:focus { outline:none; background:rgba(255,255,255,0.25); }
.badge { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.25); padding:4px 12px; border-radius:20px; font-size:0.78em; }
.hdr-btns { display:flex; gap:8px; align-items:center; }
.hdr-btn { background:rgba(255,255,255,0.2); border:1px solid rgba(255,255,255,0.3); color:white; padding:5px 12px; border-radius:7px; cursor:pointer; font-family:inherit; font-size:0.8em; white-space:nowrap; }
.hdr-btn:hover { background:rgba(255,255,255,0.3); }

.statusbar { background:var(--bg2); padding:10px 36px; display:flex; gap:20px; align-items:center; flex-wrap:wrap; border-bottom:1px solid var(--border); font-size:0.75em; color:var(--text2); }
.legend { display:flex; align-items:center; gap:5px; }
.ldot { width:9px; height:9px; border-radius:2px; }
.tip { margin-left:auto; font-size:0.72em; color:var(--text4); }

.container { padding:20px 36px 60px; max-width:100%; margin:0 auto; }

.summary { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-bottom:20px; }
.sum-card { background:var(--bg2); border-radius:10px; padding:12px 16px; border:1px solid var(--border); }
.sum-card .n { font-size:1.6em; font-weight:800; margin-bottom:2px; }
.sum-card .l { font-size:0.72em; color:var(--text3); }
.c-blue .n{color:#60a5fa} .c-green .n{color:#4ade80} .c-yellow .n{color:#fbbf24} .c-purple .n{color:#c084fc}

/* ─── 페이즈 ─── */
.phase-block { margin-bottom:20px; border-radius:12px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.3); }
.phase-block.sortable-ghost { opacity:0.4; }
.phase-block.sortable-chosen { box-shadow:0 0 0 2px #3b82f6,0 4px 20px rgba(0,0,0,0.4); }
.phase-header { padding:10px 14px; display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; flex-wrap:wrap; }
.phase-header:hover { filter:brightness(1.08); }

.ph-drag { cursor:grab; opacity:0.5; font-size:1.1em; padding:2px 6px; border-radius:4px; flex-shrink:0; margin-right:2px; }
.ph-drag:hover { opacity:1; background:rgba(255,255,255,0.15); }
.ph-drag:active { cursor:grabbing; }
.ph-del-btn { background:rgba(0,0,0,0.25); border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.7); border-radius:5px; width:22px; height:22px; cursor:pointer; font-size:0.9em; line-height:1; flex-shrink:0; display:flex; align-items:center; justify-content:center; padding:0; }
.ph-del-btn:hover { background:rgba(239,68,68,0.6); border-color:rgba(239,68,68,0.8); color:white; }
.task-drag { cursor:grab; opacity:0.3; font-size:1em; padding:1px 3px; flex-shrink:0; color:var(--text3); }
.task-drag:hover { opacity:0.8; }
.task-drag:active { cursor:grabbing; }

.ph-left { display:flex; align-items:center; gap:6px; flex-shrink:0; }
.ph-pct { font-size:0.78em; font-weight:700; background:rgba(0,0,0,0.25); padding:2px 8px; border-radius:10px; white-space:nowrap; }
.ph-date { background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3); color:white; padding:2px 4px; border-radius:4px; font-size:0.75em; font-family:inherit; width:100px; }
.ph-date:focus { outline:none; background:rgba(255,255,255,0.25); }
.ph-dur { font-size:0.72em; opacity:0.6; white-space:nowrap; display:inline-block; }
.ph-title-wrap { flex:none; display:flex; align-items:center; gap:4px; }
.ph-title-text { font-weight:700; font-size:0.95em; color:white; outline:none; border-radius:4px; padding:1px 3px; cursor:default; white-space:nowrap; }
.ph-title-text[contenteditable="true"] { background:rgba(0,0,0,0.2); border-bottom:1px dashed rgba(255,255,255,0.5); cursor:text; }
.ph-edit-btn { background:none; border:none; color:rgba(255,255,255,0.45); cursor:pointer; font-size:0.78em; padding:2px 5px; border-radius:4px; flex-shrink:0; line-height:1; }
.ph-edit-btn:hover { color:white; background:rgba(255,255,255,0.15); }
.ph-toggle { font-size:0.8em; opacity:0.7; transition:transform 0.2s; flex-shrink:0; }
.ph-toggle.open { transform:rotate(90deg); }

/* ─── 테이블 ─── */
.gantt-wrap { background:var(--row-upper); overflow-x:auto; }
.gtable { border-collapse:collapse; }
.gtable thead th { background:#d4dced; color:#475569; font-size:0.65em; font-weight:600; padding:6px 4px; border-bottom:1px solid #b8c4d8; white-space:nowrap; text-align:left; }
.gtable th.wth { text-align:center; width:34px; min-width:34px; }
.gtable tbody.task-group { border-bottom:1px solid var(--bg4); }
.gtable tbody.task-group:last-of-type { border-bottom:none; }
.gtable tbody.task-group.sortable-ghost { opacity:0.3; }
.gtable tbody.task-group.sortable-chosen td { background:#e2eaf5; }
.gtable tbody.task-group tr:hover .tcell { background:#e2eaf5; }
.gtable tfoot td { padding:0; }

/* ─── 작업 셀 ─── */
.tcell { padding:8px 10px; background:var(--row-upper); min-width:220px; display:flex; flex-direction:column; gap:4px; }
.tmain { display:flex; align-items:center; gap:5px; }
.tnum { color:var(--text4); font-size:0.68em; min-width:18px; flex-shrink:0; }
.ttitle { font-size:0.83em; outline:none; border-bottom:1px dashed transparent; line-height:1.4; cursor:text; color:var(--text); white-space:nowrap; }
.ttitle:focus { border-bottom-color:#3b82f6; }
.ttitle:empty:before { content:'작업명 입력...'; color:var(--text4); }
.task-done-badge { font-size:0.63em; padding:1px 6px; border-radius:8px; background:#14532d; color:#86efac; flex-shrink:0; }
.task-pct { font-size:0.68em; padding:2px 7px; border-radius:8px; background:#dc2626; color:#fff; font-weight:700; flex-shrink:0; white-space:nowrap; }
.task-pct.done { background:#15803d; }

.abtn,.sbtn { font-size:0.68em; padding:2px 7px; border-radius:10px; border:none; outline:none; font-family:inherit; cursor:pointer; white-space:nowrap; flex-shrink:0; }
.a-me{background:#1d4ed8;color:#bfdbfe} .a-dev{background:#7c3aed;color:#ede9fe} .a-both{background:#065f46;color:#a7f3d0}
.s-todo{background:var(--bg2);color:var(--text3);border:1px solid var(--border)!important}
.s-doing{background:#92400e;color:#fcd34d} .s-done{background:#14532d;color:#86efac}
.s-hold{background:#3b1f6b;color:#c4b5fd} .s-review{background:#1e3a8a;color:#93c5fd}
select.sbtn { appearance:none; -webkit-appearance:none; cursor:pointer; }
.task-del-btn { background:none; border:none; color:var(--text4); cursor:pointer; font-size:1em; padding:0 3px; opacity:0.3; line-height:1; flex-shrink:0; }
.task-del-btn:hover { opacity:1; color:#ef4444; }

.tdates { display:flex; align-items:center; gap:4px; padding-left:26px; }
.tdlabel { font-size:0.62em; color:var(--text4); }
.tdinput { background:var(--input-bg); border:1px solid var(--border); color:var(--text2); padding:1px 4px; border-radius:4px; font-size:0.65em; font-family:inherit; width:100px; cursor:pointer; }
.tdinput:focus { outline:none; border-color:#3b82f6; color:var(--text); }
.tdsep { color:var(--text4); font-size:0.65em; }
.tddur { font-size:0.62em; color:var(--text4); }

.pdot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.p-high{background:#ef4444} .p-mid{background:#f59e0b} .p-low{background:#22c55e}

.wcell { width:34px; min-width:34px; padding:4px 3px; text-align:center; background:var(--row-upper); vertical-align:middle; }
.wbar { height:26px; border-radius:4px; cursor:pointer; transition:opacity 0.15s; }
.wbar:hover { opacity:0.8; }
.w-empty  { background:rgba(255,255,255,0.5); border:1px dashed #9bacc8; }
.w-todo   { background:#334155; }
.w-doing  { background:linear-gradient(90deg,#92400e,#b45309); }
.w-done   { background:linear-gradient(90deg,#14532d,#166534); }
.w-hold   { background:linear-gradient(90deg,#3b1f6b,#4c1d95); }
.w-review { background:linear-gradient(90deg,#1e3a8a,#1e40af); }

/* ─── 메모 / 세부작업 ─── */
.tnote-td { padding:0 !important; }
.tnote { font-size:0.68em; color:var(--text3); padding:2px 10px 4px 38px; background:var(--row-lower); outline:none; border-bottom:1px dashed transparent; display:block; width:100%; }
.tnote:focus { border-bottom-color:#3b82f6; color:var(--text2); }
.tnote:empty:before { content:'메모...'; color:var(--note-ph); }
.subtasks-wrap { padding:2px 10px 6px 38px; background:var(--row-lower); }
.subtask-row { display:flex; align-items:center; gap:6px; padding:3px 0; }
.subtask-row input[type=checkbox] { cursor:pointer; flex-shrink:0; }
.subtask-title { font-size:0.72em; color:var(--text2); flex:1; outline:none; border-bottom:1px dashed transparent; cursor:text; }
.subtask-title:focus { border-bottom-color:#3b82f6; }
.st-done-badge { font-size:0.63em; padding:1px 6px; border-radius:8px; background:#14532d; color:#86efac; flex-shrink:0; white-space:nowrap; }
.st-status-sel { font-size:0.63em; padding:1px 4px; border-radius:8px; border:1px solid var(--border); background:var(--bg3); color:var(--text2); font-family:inherit; cursor:pointer; flex-shrink:0; }
.st-status-sel:focus { outline:none; border-color:#3b82f6; }
.st-del { background:none; border:none; color:var(--text4); cursor:pointer; font-size:0.85em; padding:0 2px; opacity:0.4; }
.st-del:hover { opacity:1; color:#ef4444; }
.st-add-btn { background:none; border:none; color:var(--text4); cursor:pointer; font-size:0.7em; padding:3px 0; opacity:0.5; font-family:inherit; }
.st-add-btn:hover { opacity:1; color:var(--text2); }

.add-btn { background:none; border:1px dashed var(--border); color:var(--text4); padding:7px; width:100%; cursor:pointer; font-size:0.75em; transition:all 0.2s; font-family:inherit; }
.add-btn:hover { background:var(--bg5); color:var(--text2); }
.add-phase-btn { display:block; width:100%; padding:14px; background:none; border:2px dashed var(--border); border-radius:12px; color:var(--text3); font-size:0.85em; font-family:inherit; cursor:pointer; transition:all 0.2s; margin-top:8px; }
.add-phase-btn:hover { background:var(--bg2); color:var(--text2); border-color:var(--text3); }

/* ─── 모바일 간트 (데스크탑 숨김) ─── */
.mobile-gantt-wrap { display:none; overflow-x:auto; scrollbar-width:none; background:var(--row-upper); }
.mobile-gantt-wrap::-webkit-scrollbar { display:none; }
.mob-gantt-inner { display:flex; gap:3px; padding:6px 10px; }
.mob-wk { display:flex; flex-direction:column; align-items:center; gap:2px; flex-shrink:0; }
.mob-wbar { width:28px; height:16px; border-radius:3px; cursor:pointer; transition:opacity .15s; }
.mob-wbar:hover { opacity:.75; }
.mob-wbar.w-empty { background:rgba(255,255,255,0.5); border:1px dashed #9bacc8; }
.mob-wbar.w-todo  { background:#334155; }
.mob-wbar.w-doing { background:linear-gradient(90deg,#92400e,#b45309); }
.mob-wbar.w-done  { background:linear-gradient(90deg,#14532d,#166534); }
.mob-wbar.w-hold  { background:linear-gradient(90deg,#3b1f6b,#4c1d95); }
.mob-wbar.w-review{ background:linear-gradient(90deg,#1e3a8a,#1e40af); }
.mob-wlabel { font-size:0.48em; color:var(--text4); white-space:nowrap; }

/* ─── 필터 패널 ─── */
.filter-panel { background:var(--bg2); border:1px solid var(--border); border-radius:10px; margin-bottom:18px; overflow:hidden; }
.filter-panel-hdr { padding:9px 16px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); font-size:0.82em; font-weight:600; }
.filter-close { background:none; border:none; color:var(--text3); cursor:pointer; font-size:1.1em; padding:0 4px; line-height:1; }
.filter-close:hover { color:var(--text); }
.filter-item { display:flex; align-items:center; gap:8px; padding:7px 16px; border-bottom:1px solid var(--bg4); flex-wrap:wrap; }
.filter-item:last-child { border-bottom:none; }
.filter-item:hover { background:var(--bg5); }
.fi-phase { font-size:0.65em; padding:2px 7px; border-radius:8px; white-space:nowrap; flex-shrink:0; display:inline-block; text-align:center; }
.fi-num { font-size:0.68em; color:var(--text4); flex-shrink:0; display:inline-block; text-align:right; }
.fi-title { font-size:0.82em; flex:1; min-width:120px; }
.fi-date { font-size:0.65em; color:var(--text3); white-space:nowrap; margin-left:auto; }
.filter-empty { padding:24px; text-align:center; color:var(--text3); font-size:0.82em; }
.sum-card { cursor:pointer; transition:box-shadow 0.15s,transform 0.1s; }
.sum-card:hover { box-shadow:0 0 0 2px var(--border); transform:translateY(-1px); }
.sum-card.active { box-shadow:0 0 0 2px #3b82f6; }

.loading { text-align:center; padding:60px; color:var(--text3); font-size:0.9em; }
.save-indicator { position:fixed; bottom:20px; right:20px; background:#14532d; color:#86efac; padding:8px 16px; border-radius:8px; font-size:0.8em; opacity:0; transition:opacity 0.3s; pointer-events:none; z-index:9999; }
.save-indicator.show { opacity:1; }

/* ─── 페이즈 진행 요약바 ─── */
.phase-sumbar { background:var(--bg3); border-bottom:1px solid var(--border); padding:7px 36px; display:flex; align-items:stretch; overflow-x:auto; scrollbar-width:none; }
.phase-sumbar::-webkit-scrollbar { display:none; }
.psb-item { display:flex; flex-direction:column; gap:4px; padding:3px 14px; border-right:1px solid var(--border); flex-shrink:0; min-width:72px; }
.psb-item:last-child { border-right:none; border-left:2px solid #3b82f6; margin-left:auto; background:#eff6ff; border-radius:0 6px 6px 0; padding:3px 18px; }
.psb-top { display:flex; align-items:center; gap:6px; white-space:nowrap; }
.psb-name { font-size:0.68em; color:var(--text2); }
.psb-pct { font-size:0.7em; font-weight:700; }
.psb-bar { height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
.psb-fill { height:100%; border-radius:2px; transition:width 0.4s; }

/* ─── 반응형: 태블릿 ─── */
@media (max-width:1024px) {
  .header, .statusbar, .phase-sumbar, .container { padding-left:20px; padding-right:20px; }
}

/* ─── 반응형: 모바일 ─── */
@media (max-width:768px) {
  .tabs-bar { padding:0 10px; min-height:38px; }
  .tab-item { padding:0 12px; font-size:0.78em; }
  .tab-add-btn { line-height:38px; padding:0 10px; }
  .header { padding:12px 14px; flex-direction:column; align-items:flex-start; gap:8px; }
  .header h1 { font-size:1.1em; }
  .header-sub { font-size:0.75em; gap:5px; flex-wrap:wrap; }
  .hdr-input { width:104px; font-size:0.8em; }
  .hdr-btns { flex-wrap:wrap; gap:6px; }
  .badge { font-size:0.72em; padding:3px 9px; }
  .hdr-btn { font-size:0.75em; padding:4px 9px; }
  .statusbar { padding:6px 14px; gap:8px; font-size:0.72em; }
  .tip { display:none; }
  .phase-sumbar { padding:5px 14px; }
  .psb-item { min-width:56px; padding:3px 8px; }
  .psb-name { font-size:0.62em; }
  .psb-pct { font-size:0.64em; }
  .container { padding:12px 8px 50px; }
  .summary { grid-template-columns:repeat(3,1fr); gap:8px; }
  .sum-card { padding:10px 12px; }
  .sum-card .n { font-size:1.3em; }
  .phase-header { padding:9px 12px; flex-wrap:wrap; gap:5px; }
  .ph-title-edit { font-size:0.88em; min-width:60px; }
  .ph-left { flex-wrap:wrap; gap:4px; }
  .ph-date { width:90px; font-size:0.71em; }
  .ph-dur, .ph-pct { font-size:0.7em; }
  .gtable { width:100%; }
  .gtable th:first-child { min-width:0!important; width:100%!important; }
  .gtable th.wth { display:none; }
  .task-main-row td:nth-child(n+2) { display:none; }
  .tcell { min-width:0!important; max-width:100%!important; width:100%!important; box-sizing:border-box; }
  .tmain { flex-wrap:nowrap; gap:5px; }
  .ttitle { font-size:0.84em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .tnum { font-size:0.65em; flex-shrink:0; }

// ─── 주간 계산 ───
function getMonday(date) {
  const d = new Date(date)
  const day = d.getDay()
  d.setDate(d.getDate() - day + (day===0 ? -6 : 1))
  d.setHours(0,0,0,0)
  return d
}
function dateStr(d) { return d.toISOString().split('T')[0] }

function computeWeekRange() {
  let minD = null, maxD = null
  if (state.settings.start_date) { const d=new Date(state.settings.start_date); if(!minD||d<minD) minD=d }
  if (state.settings.end_date)   { const d=new Date(state.settings.end_date);   if(!maxD||d>maxD) maxD=d }
  Object.values(state.tasks).flat().forEach(t => {
    if (t.start_date) { const d=new Date(t.start_date); if(!minD||d<minD) minD=d }
    if (t.end_date)   { const d=new Date(t.end_date);   if(!maxD||d>maxD) maxD=d }
  })
  if (!minD) minD = new Date('2026-04-14')
  if (!maxD) { maxD = new Date(minD); maxD.setDate(maxD.getDate()+77) }

  const start = getMonday(minD)
  const end   = getMonday(maxD)
  const weeks = []
  const cur = new Date(start)
  while (cur <= end) { weeks.push(dateStr(cur)); cur.setDate(cur.getDate()+7) }
  return weeks
}

function migrateWeekBars(task) {
  if (Array.isArray(task.week_bars)) {
    const obj = {}
    ORIG_WEEKS.forEach((wd,i) => { if(task.week_bars[i]) obj[wd]=task.week_bars[i] })
    task.week_bars = obj
  } else if (!task.week_bars) {
    task.week_bars = {}
  }
}

}

// ─── 프로젝트 데이터 로드 ───
async function loadProject(id) {
  currentProjectId = id
  localStorage.setItem('activeProject', String(id))

  document.getElementById('app').innerHTML = '<div class="loading">⏳ 불러오는 중...</div>'

  const proj = projects.find(p => p.id === id)
  state.settings = proj || {}

  const { data: ph, error: phError } = await db.from('tt_phases').select('*').eq('project_id', id).order('sort_order')

  if (phError && (phError.message||'').includes('project_id')) {
    showMigrationNotice()
    return
  }

  state.phases = ph || []
  state.tasks = {}

  const pIds = state.phases.map(p => p.id)
  if (pIds.length > 0) {
    const { data: tk } = await db.from('tt_tasks').select('*').in('phase_id', pIds).order('sort_order')
    ;(tk||[]).forEach(t => {
      migrateWeekBars(t)
      if (!state.tasks[t.phase_id]) state.tasks[t.phase_id] = []
      state.tasks[t.phase_id].push(t)
    })
  }

  WEEK_DATES = computeWeekRange()
  render()
  subscribe()
}

  const { data: phList } = await db.from('tt_phases').select('id').eq('project_id', id)

  return `<div class="summary">

          <span class="task-done-badge" id="task-done-badge-${t.id}" ${allSubDone?'':'style="display:none"'}>완료</span>
          ${taskPct!==null?`<span class="task-pct${taskPct===100?' done':''}" id="tprog-${t.id}">${taskPct}%</span>`:`<span class="task-pct" id="tprog-${t.id}" style="display:none">0%</span>`}
          <button class="abtn ${aClass}" onclick="cycleAssignee('${t.id}')">${t.assignee||'이윤희'}</button>
          <button class="task-del-btn" onclick="deleteTask('${t.id}')" title="작업 삭제">×</button>
        </div>
        <div class="tdates">
          <span class="tdlabel">시작</span>
          <input type="date" class="tdinput" value="${t.start_date||''}" onchange="saveTask('${t.id}',{start_date:this.value});updateTaskDur(this)">
          <span class="tdsep">→</span>
          <span class="tdlabel">완료</span>
          <input type="date" class="tdinput" value="${t.end_date||''}" onchange="saveTask('${t.id}',{end_date:this.value});updateTaskDur(this)">
          <span class="tddur" id="tdur-${t.id}">${dur||''}</span>
        </div>
      </div></td>
      ${bars}
    </tr>
    <tr>
      <td class="tnote-td" colspan="${WEEK_DATES.length+1}">
        <div class="mobile-gantt-wrap" id="mgw-${t.id}">
          <div class="mob-gantt-inner">
            ${WEEK_DATES.map(wd=>{
              const b=(t.week_bars&&t.week_bars[wd])||''
              const d=new Date(wd)
              return `<div class="mob-wk"><div class="mob-wbar ${b||'w-empty'}" onclick="toggleWeekBar('${t.id}','${wd}')"></div><div class="mob-wlabel">${d.getMonth()+1}/${d.getDate()}</div></div>`
            }).join('')}

        </div>
        <div class="tnote" contenteditable="true" onblur="debounceSave('${t.id}',{note:this.textContent.trim()})">${esc(t.note||'')}</div>
        <div class="subtasks-wrap" id="stw-${t.id}">

      </td>

}

// ─── Sortable ───
function initSortable() {
  initPhaseSortable()
  state.phases.forEach(p=>initTaskSortable(p.id))
}
function initPhaseSortable() {
  const wrap=document.getElementById('phases-wrap')
  if(!wrap) return
  Sortable.create(wrap,{
    handle:'.ph-drag', animation:180, ghostClass:'sortable-ghost', chosenClass:'sortable-chosen',
    onEnd:async({oldIndex,newIndex})=>{
      if(oldIndex===newIndex) return
      const [moved]=state.phases.splice(oldIndex,1); state.phases.splice(newIndex,0,moved)
      await Promise.all(state.phases.map((p,i)=>db.from('tt_phases').update({sort_order:i+1}).eq('id',p.id)))
      showSaved()
    }
  })
}
function initTaskSortable(phaseId) {
  const table=document.getElementById('gtable-'+phaseId)
  if(!table) return
  Sortable.create(table,{
    handle:'.task-drag', draggable:'tbody.task-group', animation:150,
    ghostClass:'sortable-ghost', chosenClass:'sortable-chosen',
    onEnd:async({oldIndex,newIndex})=>{
      if(oldIndex===newIndex) return
      const tasks=state.tasks[phaseId]; if(!tasks) return
      const [moved]=tasks.splice(oldIndex,1); tasks.splice(newIndex,0,moved)
      await Promise.all(tasks.map((t,i)=>db.from('tt_tasks').update({sort_order:i}).eq('id',t.id)))
      showSaved()
    }
  })
}

function rerenderAllPhases() {
  WEEK_DATES = computeWeekRange()
  const wrap=document.getElementById('phases-wrap')
  if(!wrap) return
  wrap.innerHTML=state.phases.map(p=>renderPhase(p)).join('')
  initPhaseSortable()
  state.phases.forEach(p=>initTaskSortable(p.id))
  setTimeout(syncPhaseTitleWidths,0)
}

// ─── 유틸 ───
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }
function calcDur(s,e){
  if(!s||!e) return ''
  const d=Math.round((new Date(e)-new Date(s))/86400000)
  return d<0?'⚠️':d===0?'당일':Math.round(d/7)+'주'
}
function showSaved(){
  const el=document.getElementById('save-indicator')
  el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),1500)
}
function findTask(id){ return Object.values(state.tasks).flat().find(t=>t.id===id) }

// ─── DB 저장 ───
async function saveTask(id,updates){
  Object.assign(findTask(id)||{},updates)
  await db.from('tt_tasks').update(updates).eq('id',id)
  showSaved()
}
function debounceSave(id,updates){
  clearTimeout(saveTimers[id]); saveTimers[id]=setTimeout(()=>saveTask(id,updates),600)
}
async function savePhase(id,updates){
  const ph=state.phases.find(p=>p.id===id); if(ph) Object.assign(ph,updates)
  await db.from('tt_phases').update(updates).eq('id',id); showSaved()
}
async function savePhaseTitle(id,value){ await savePhase(id,{title:value}); syncPhaseTitleWidths() }

async function saveSetting(key,value){

  showSaved()
}

// ─── 대시보드 필터 ───
let _activeFilter=null
function showTaskFilter(type,el){
  const panel=document.getElementById('task-filter-panel')
  if(!panel) return
  if(_activeFilter===type){
    _activeFilter=null; panel.style.display='none'
    document.querySelectorAll('.sum-card').forEach(c=>c.classList.remove('active'))
    return
  }
  _activeFilter=type
  document.querySelectorAll('.sum-card').forEach(c=>c.classList.remove('active'))
  el.classList.add('active')

  const allSubs=[]
  Object.values(state.tasks).flat().forEach(t=>{
    const phase=state.phases.find(p=>p.id===t.phase_id)
    ;(t.subtasks||[]).forEach(s=>{ allSubs.push({sub:s,task:t,phase}) })
  })
  let filtered
  if(type==='전체')     filtered=allSubs
  else if(type==='완료') filtered=allSubs.filter(({sub})=>sub.done||sub.status==='완료')
  else if(type==='진행중') filtered=allSubs.filter(({sub})=>!sub.done&&sub.status==='진행중')
  else                 filtered=allSubs.filter(({sub})=>!sub.done&&sub.status!=='진행중')

  const items=filtered.map(({sub,task,phase})=>{
    const colors=(phase?.gradient||'').match(/#[0-9a-f]{6}/gi)
    const phColor=colors?colors[colors.length-1]:'#64748b'
    const isDone=sub.done||sub.status==='완료'
    const stLabel=isDone?'완료':(sub.status||'예정')
    const sClass={'완료':'s-done','진행중':'s-doing','예정':'s-todo'}[stLabel]||'s-todo'
    const aClass=task.assignee==='이순구'?'a-dev':task.assignee==='공동'?'a-both':'a-me'
    return `<div class="filter-item">
      <span class="fi-phase" style="background:${phColor}22;color:${phColor};border:1px solid ${phColor}55">${esc(phase?.title||'-')}</span>
      <span class="fi-num">${esc(task.task_num||'')}</span>
      <span class="fi-title">${esc(sub.title)}</span>
      <span class="abtn ${aClass} fi-a" style="font-size:0.63em;padding:1px 6px;flex-shrink:0;display:inline-block;text-align:center">${esc(task.assignee||'이윤희')}</span>
      <span class="sbtn ${sClass} fi-s" style="font-size:0.62em;padding:1px 5px;flex-shrink:0;display:inline-block;text-align:center">${stLabel}</span>
    </div>`
  }).join('')

  panel.style.display='block'
  panel.innerHTML=`<div class="filter-panel-hdr">
    <span>${type} <span style="opacity:.5;font-weight:400">${filtered.length}건</span></span>
    <button class="filter-close" onclick="showTaskFilter('${type}',document.querySelector('.sum-card.active'))">×</button>
  </div>${items||'<div class="filter-empty">해당하는 작업이 없습니다.</div>'}`
  syncFilterWidths()
}
function syncFilterWidths(){
  let maxPhase=0, maxNum=0, maxA=0, maxS=0
  document.querySelectorAll('.fi-phase').forEach(el=>{ maxPhase=Math.max(maxPhase,el.scrollWidth) })
  document.querySelectorAll('.fi-num').forEach(el=>{ maxNum=Math.max(maxNum,el.scrollWidth) })
  document.querySelectorAll('.fi-a').forEach(el=>{ maxA=Math.max(maxA,el.scrollWidth) })
  document.querySelectorAll('.fi-s').forEach(el=>{ maxS=Math.max(maxS,el.scrollWidth) })
  if(maxPhase) document.querySelectorAll('.fi-phase').forEach(el=>{ el.style.width=maxPhase+'px' })
  if(maxNum)   document.querySelectorAll('.fi-num').forEach(el=>{ el.style.width=maxNum+'px' })
  if(maxA)     document.querySelectorAll('.fi-a').forEach(el=>{ el.style.width=maxA+'px' })
  if(maxS)     document.querySelectorAll('.fi-s').forEach(el=>{ el.style.width=maxS+'px' })
}

function syncPhaseTitleWidths(){
  let maxTitle=0
  document.querySelectorAll('.ph-title-text').forEach(el=>{ maxTitle=Math.max(maxTitle,el.scrollWidth) })
  if(maxTitle) document.querySelectorAll('.ph-title-wrap').forEach(w=>{ w.style.width=(maxTitle+36)+'px' })
  let maxDur=0
  document.querySelectorAll('.ph-dur').forEach(el=>{ maxDur=Math.max(maxDur,el.scrollWidth) })
  if(maxDur) document.querySelectorAll('.ph-dur').forEach(el=>{ el.style.display='inline-block'; el.style.width=maxDur+'px' })
}

}

// ─── 주간바 자동채색 ───
async function autoFillWeekBars(taskId){
  const task=findTask(taskId)
  if(!task||(!task.start_date&&!task.end_date)) return
  const start=task.start_date?new Date(task.start_date):new Date(task.end_date)
  const end=task.end_date?new Date(task.end_date):new Date(task.start_date)
  const bar=STATUS_BAR[task.status||'예정']||'w-todo'

  const newWeeks=computeWeekRange()
  const weeksChanged=JSON.stringify(newWeeks)!==JSON.stringify(WEEK_DATES)
  WEEK_DATES=newWeeks

  const bars={...(task.week_bars||{})}
  WEEK_DATES.forEach(wd=>{
    const wStart=new Date(wd), wEnd=new Date(wStart.getTime()+6*86400000)
    bars[wd]=(wStart<=end&&wEnd>=start)?bar:''
  })
  task.week_bars=bars
  await db.from('tt_tasks').update({week_bars:bars}).eq('id',taskId)

  if(weeksChanged){
    rerenderAllPhases()
  } else {
    const row=document.getElementById('trow-'+taskId)
    if(row) WEEK_DATES.forEach((wd,i)=>{
      const b=bars[wd]||''
      const el=row.querySelector(`td:nth-child(${i+2}) .wbar`)
      if(el) el.className='wbar '+(b||'w-empty')
    })
  }
  showSaved()
}

function refreshWeeks(){
  const newWeeks=computeWeekRange()
  if(JSON.stringify(newWeeks)!==JSON.stringify(WEEK_DATES)) rerenderAllPhases()
}

// ─── 순환/변경 ───
async function cycleAssignee(id){
  const task=findTask(id); if(!task) return
  const next=ASSIGNEES[(ASSIGNEES.indexOf(task.assignee)+1)%ASSIGNEES.length]
  await saveTask(id,{assignee:next})
  const btn=document.querySelector(`#trow-${id} .abtn`)
  if(btn){btn.textContent=next;btn.className='abtn '+(next==='이순구'?'a-dev':next==='공동'?'a-both':'a-me')}
}
async function changeStatus(id,value){
  await saveTask(id,{status:value})
  const map={'예정':'s-todo','진행중':'s-doing','완료':'s-done','보류':'s-hold','검토중':'s-review'}
  const sel=document.querySelector(`#trow-${id} .sbtn`)
  if(sel) sel.className='sbtn '+(map[value]||'s-todo')
  const sw=document.getElementById('summary-wrap'); if(sw) sw.innerHTML=renderSummary()
  refreshAllPhasePcts()
  autoFillWeekBars(id)
}
async function cyclePriority(id){
  const task=findTask(id); if(!task) return
  const prios=['high','mid','low']
  const next=prios[(prios.indexOf(task.priority)+1)%prios.length]
  await saveTask(id,{priority:next})
  const dot=document.querySelector(`#trow-${id} .pdot`)
  if(dot) dot.className='pdot p-'+next
}
async function toggleWeekBar(id,weekDate){
  const task=findTask(id); if(!task) return
  const bars={...(task.week_bars||{})}
  const current=bars[weekDate]||''
  const next=WBAR_STATES[(WBAR_STATES.indexOf(current)+1)%WBAR_STATES.length]
  bars[weekDate]=next; task.week_bars=bars
  await db.from('tt_tasks').update({week_bars:bars}).eq('id',id)
  const idx=WEEK_DATES.indexOf(weekDate)
  const bar=document.querySelector(`#trow-${id} td:nth-child(${idx+2}) .wbar`)
  if(bar) bar.className='wbar '+(next||'w-empty')
  showSaved()
}

function calcTaskProgress(task){
  const subs=task.subtasks||[]
  if(subs.length===0) return 0.0
  const done=subs.filter(s=>s.done||s.status==='완료').length
  return done/subs.length
}
function renderSubtaskList(t){
  return (t.subtasks||[]).map((st,i)=>{
    const isDone=st.done||st.status==='완료'
    const stStatus=isDone?'완료':(st.status||'예정')
    return `<div class="subtask-row" id="str-${t.id}-${i}">
      <input type="checkbox" ${isDone?'checked':''} onchange="toggleSubtask('${t.id}',${i},this.checked)">
      <span class="subtask-title" contenteditable="true" onblur="editSubtask('${t.id}',${i},this.textContent.trim())">${esc(st.title)}</span>
      ${isDone
        ?`<span class="st-done-badge">완료</span>`
        :`<select class="st-status-sel" onchange="setSubtaskStatus('${t.id}',${i},this.value)">
            <option value="예정" ${stStatus==='예정'?'selected':''}>예정</option>
            <option value="진행중" ${stStatus==='진행중'?'selected':''}>진행중</option>
          </select>`
      }
      <button class="st-del" onclick="deleteSubtask('${t.id}',${i})">×</button>
    </div>`
  }).join('')+`<button class="st-add-btn" onclick="addSubtask('${t.id}')">＋ 세부작업</button>`
}
function updateTaskDoneBadge(taskId){
  const task=findTask(taskId); if(!task) return
  const subs=task.subtasks||[]
  const allDone=subs.length>0&&subs.every(s=>s.done||s.status==='완료')
  const badge=document.getElementById('task-done-badge-'+taskId)
  if(badge) badge.style.display=allDone?'':'none'
  const done=subs.filter(s=>s.done||s.status==='완료').length
  const pctEl=document.getElementById('tprog-'+taskId)
  if(pctEl){
    if(subs.length===0){ pctEl.style.display='none'; return }
    const pct=Math.round(done/subs.length*100)
    pctEl.textContent=pct+'%'
    pctEl.style.display=''
    pctEl.className='task-pct'+(pct===100?' done':'')
  }
}
function refreshAllPhasePcts(){
  state.phases.forEach(phase=>{
    const tasks=state.tasks[phase.id]||[]
    const pct=tasks.length>0?Math.round(tasks.reduce((s,t)=>s+calcTaskProgress(t),0)/tasks.length*100):0
    const el=document.getElementById('ph-pct-'+phase.id)
    if(el){el.textContent=pct+'%';el.style.color=pct===100?'#4ade80':pct>=50?'#fbbf24':'#94a3b8'}
    const hdr=document.getElementById('phhdr-'+phase.id)
    if(hdr) hdr.style.background=`linear-gradient(to right,transparent ${pct}%,rgba(0,0,0,0.42) ${pct}%),${phase.gradient}`
  })
  const sumbar=document.getElementById('phase-sumbar')
  if(sumbar) sumbar.outerHTML=renderPhaseSummaryBar()
}

function togglePhase(id){

// ─── 페이즈 추가 ───
async function addPhase(){
  const newOrder=state.phases.length+1
  const {data,error}=await db.from('tt_phases')
    .insert({
      title:'새 페이즈',
      icon:PH_ICONS[(newOrder-1)%PH_ICONS.length],
      gradient:PH_GRADIENTS[(newOrder-1)%PH_GRADIENTS.length],
      sort_order:newOrder,
      project_id:currentProjectId
    })
    .select().single()
  if(error||!data){alert('페이즈 추가 실패: '+(error?.message||''));return}
  state.phases.push(data); state.tasks[data.id]=[]
  const wrap=document.getElementById('phases-wrap')
  if(wrap){wrap.insertAdjacentHTML('beforeend',renderPhase(data));initTaskSortable(data.id)}
  showSaved()
}

// ─── 작업 추가/삭제 ───
async function addTask(phaseId){
  const tasks=state.tasks[phaseId]||[]
  const phaseNum=state.phases.find(p=>p.id===phaseId)?.sort_order||''
  const {data,error}=await db.from('tt_tasks')
    .insert({phase_id:phaseId,task_num:phaseNum+'.'+(tasks.length+1),title:'새 작업',sort_order:tasks.length})
    .select().single()
  if(error||!data) return
  migrateWeekBars(data)
  if(!state.tasks[phaseId]) state.tasks[phaseId]=[]
  state.tasks[phaseId].push(data)
  const table=document.getElementById('gtable-'+phaseId)
  const tfoot=table?.querySelector('tfoot')
  if(tfoot) tfoot.insertAdjacentHTML('beforebegin',renderTask(data))
  const sw=document.getElementById('summary-wrap'); if(sw) sw.innerHTML=renderSummary()
  showSaved()
}
async function deletePhase(id){
  const ph=state.phases.find(p=>p.id===id)
  const cnt=(state.tasks[id]||[]).length
  const msg=cnt>0?'"'+ph?.title+'" 페이즈와 포함된 '+cnt+'개 작업을 모두 삭제할까요?':'"'+ph?.title+'" 페이즈를 삭제할까요?'
  if(!confirm(msg)) return
  await db.from('tt_tasks').delete().eq('phase_id',id)
  await db.from('tt_phases').delete().eq('id',id)
  state.phases=state.phases.filter(p=>p.id!==id)
  delete state.tasks[id]
  document.getElementById('ph-'+id)?.remove()
  const sw=document.getElementById('summary-wrap'); if(sw) sw.innerHTML=renderSummary()
  showSaved()
}
async function deleteTask(id){
  if(!confirm('이 작업을 삭제하시겠습니까?')) return
  await db.from('tt_tasks').delete().eq('id',id)
  const phaseId=Object.keys(state.tasks).find(pid=>state.tasks[pid].some(t=>t.id===id))
  if(phaseId) state.tasks[phaseId]=state.tasks[phaseId].filter(t=>t.id!==id)
  document.getElementById('tg-'+id)?.remove()
  const sw=document.getElementById('summary-wrap'); if(sw) sw.innerHTML=renderSummary()
  showSaved()
}

// ─── 세부작업 ───
async function addSubtask(taskId){
  const task=findTask(taskId); if(!task) return
  const subtasks=[...(task.subtasks||[]),{id:Date.now(),title:'새 세부작업',done:false,status:'예정'}]
  task.subtasks=subtasks
  await db.from('tt_tasks').update({subtasks}).eq('id',taskId)
  rerenderSubtasks(taskId)
  updateTaskDoneBadge(taskId)
  refreshAllPhasePcts()
  const sw=document.getElementById('summary-wrap'); if(sw) sw.innerHTML=renderSummary()
  showSaved()
}
async function toggleSubtask(taskId,idx,done){
  const task=findTask(taskId); if(!task) return
  const subtasks=[...(task.subtasks||[])]
  subtasks[idx]={...subtasks[idx],done,status:done?'완료':(subtasks[idx].status==='완료'?'예정':subtasks[idx].status||'예정')}
  task.subtasks=subtasks
  await db.from('tt_tasks').update({subtasks}).eq('id',taskId)
  rerenderSubtasks(taskId)
  updateTaskDoneBadge(taskId)
  refreshAllPhasePcts()
  const sw=document.getElementById('summary-wrap'); if(sw) sw.innerHTML=renderSummary()
  showSaved()
}
async function setSubtaskStatus(taskId,idx,status){
  const task=findTask(taskId); if(!task) return
  const subtasks=[...(task.subtasks||[])]
  subtasks[idx]={...subtasks[idx],status,done:status==='완료'}
  task.subtasks=subtasks
  await db.from('tt_tasks').update({subtasks}).eq('id',taskId)
  rerenderSubtasks(taskId)
  updateTaskDoneBadge(taskId)
  refreshAllPhasePcts()
  const sw=document.getElementById('summary-wrap'); if(sw) sw.innerHTML=renderSummary()
  showSaved()
}
async function editSubtask(taskId,idx,title){
  const task=findTask(taskId); if(!task||!task.subtasks?.[idx]) return
  const subtasks=[...(task.subtasks||[])]; subtasks[idx]={...subtasks[idx],title}; task.subtasks=subtasks
  await db.from('tt_tasks').update({subtasks}).eq('id',taskId); showSaved()
}
async function deleteSubtask(taskId,idx){
  const task=findTask(taskId); if(!task) return
  const subtasks=[...(task.subtasks||[])]; subtasks.splice(idx,1); task.subtasks=subtasks
  await db.from('tt_tasks').update({subtasks}).eq('id',taskId)
  rerenderSubtasks(taskId)
  updateTaskDoneBadge(taskId)
  refreshAllPhasePcts()
  const sw=document.getElementById('summary-wrap'); if(sw) sw.innerHTML=renderSummary()
  showSaved()
}
function rerenderSubtasks(taskId){
  const task=findTask(taskId); if(!task) return
  const wrap=document.getElementById('stw-'+taskId); if(!wrap) return
  wrap.innerHTML=renderSubtaskList(task)
}

// ─── 실시간 구독 ───
function subscribe(){
  if(subscriptionChannel) db.removeChannel(subscriptionChannel)
  subscriptionChannel = db.channel('timetable-live-'+currentProjectId)
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'tt_tasks'},({new:t})=>{
      if(!findTask(t.id)) return
      const task=findTask(t.id); if(task){ migrateWeekBars(t); Object.assign(task,t) }
      const row=document.getElementById('trow-'+t.id)
      if(row){
        const aBtn=row.querySelector('.abtn'),sBtn=row.querySelector('.sbtn')
        const aMap={'이순구':'a-dev','공동':'a-both','이윤희':'a-me'}
        const sMap={'예정':'s-todo','진행중':'s-doing','완료':'s-done','보류':'s-hold','검토중':'s-review'}
        if(aBtn){aBtn.textContent=t.assignee;aBtn.className='abtn '+(aMap[t.assignee]||'a-me')}
        if(sBtn) sBtn.className='sbtn '+(sMap[t.status]||'s-todo')
      }
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'tt_tasks'},({new:t})=>{
      if(!state.tasks[t.phase_id]) return
      migrateWeekBars(t)
      if(!state.tasks[t.phase_id].find(x=>x.id===t.id)){
        state.tasks[t.phase_id].push(t)
        const table=document.getElementById('gtable-'+t.phase_id)
        const tfoot=table?.querySelector('tfoot')
        if(tfoot) tfoot.insertAdjacentHTML('beforebegin',renderTask(t))
      }
    })
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'tt_phases'},({new:p})=>{
      if(p.project_id!==currentProjectId) return
      if(!state.phases.find(x=>x.id===p.id)){
        state.phases.push(p); state.tasks[p.id]=[]
        const wrap=document.getElementById('phases-wrap')
        if(wrap){wrap.insertAdjacentHTML('beforeend',renderPhase(p));initTaskSortable(p.id)}
      }
    })
    .subscribe()
}

init()
